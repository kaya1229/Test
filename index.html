<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKFLIP 3D FLAT CENTER DECK</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; }
        #info { position: absolute; bottom: 5%; width: 100%; text-align: center; color: #bbb; font-size: 11px; pointer-events: none; font-family: sans-serif; letter-spacing: 1px;}
    </style>
</head>
<body>

<div id="info">KICKFLIP OFFICIAL LIGHTSTICK CONCEPT</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, boardGroup, globe, handleGroup;
    let clock = new THREE.Clock();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 22); 

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.3);
        mainLight.position.set(5, 10, 7.5);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));

        const lightstick = new THREE.Group();
        scene.add(lightstick);

        // --- 1. 푸른색 물결 쉐이더 구체 ---
        const waveUniforms = {
            time: { value: 0 },
            colorTop: { value: new THREE.Color(0xffffff) },
            colorBottom: { value: new THREE.Color(0x0055ff) },
            opacityTop: { value: 0.1 },
            opacityBottom: { value: 0.5 }
        };

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform float time;
            uniform vec3 colorTop;
            uniform vec3 colorBottom;
            uniform float opacityTop;
            uniform float opacityBottom;
            varying vec2 vUv;
            void main() {
                float wave = sin(vUv.x * 12.0 + time * 2.5) * 0.03 + sin(vUv.x * 6.0 - time * 1.5) * 0.02;
                float edge = 0.5 + wave;
                float mixFactor = smoothstep(edge - 0.01, edge + 0.01, vUv.y);
                vec3 finalColor = mix(colorBottom, colorTop, mixFactor);
                float finalOpacity = mix(opacityBottom, opacityTop, mixFactor);
                gl_FragColor = vec4(finalColor, finalOpacity);
            }
        `;

        const globeGeo = new THREE.SphereGeometry(2.8, 128, 128);
        const globeMat = new THREE.ShaderMaterial({
            uniforms: waveUniforms,
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true,
            depthWrite: false,
            side: THREE.DoubleSide
        });

        globe = new THREE.Mesh(globeGeo, globeMat);
        globe.position.y = 4.5;
        lightstick.add(globe);

        // --- 2. 평면 유지 + 킥 데크 구현 ---
        boardGroup = new THREE.Group();

        const w = 1.3, l = 4.2, r = w / 2;
        const deckShape = new THREE.Shape();
        // 양 끝 반원형 디자인
        deckShape.absarc(l/2 - r, 0, r, Math.PI * 1.5, Math.PI * 0.5, false);
        deckShape.absarc(-l/2 + r, 0, r, Math.PI * 0.5, Math.PI * 1.5, false);
        deckShape.closePath();

        const extrudeSettings = { 
            depth: 0.04, // 데크 자체 두께는 더 얇게
            bevelEnabled: true, 
            bevelThickness: 0.02, 
            bevelSize: 0.02, 
            bevelSegments: 3 
        };
        const deckGeo = new THREE.ExtrudeGeometry(deckShape, extrudeSettings);

        // 정점 변형: 중앙 평면을 확실히 유지
        /*const pos = deckGeo.attributes.position;
        // kickStart 지점을 더 바깥으로 밀어 중앙 평면 구간 확보 (l/2가 끝이므로 1.4 지점부터 킥 시작)
        const kickStart = 1.4; 

        for (let i = 0; i < pos.count; i++) {
            let x = pos.getX(i);
            // x값이 kickStart보다 작은 중앙 부분은 아래 로직을 타지 않아 평평함 유지
            if (Math.abs(x) > kickStart) {
                // 끝부분만 급격하게 솟아오름 (제곱근 계수 3.5로 강화)
                let lift = Math.pow(Math.abs(x) - kickStart, 2) * 3.5; 
                pos.setZ(i, pos.getZ(i) + lift); 
            }
        }
        deckGeo.computeVertexNormals();*/

        const deckMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.2 });
        const deck = new THREE.Mesh(deckGeo, deckMat);
        deck.rotation.x = Math.PI / 2; 
        boardGroup.add(deck);

        // 바퀴 (평평한 평면 구간 끝자락에 배치)
        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.15, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        [[-1.2, 0.35], [1.2, 0.35], [-1.2, -0.35], [1.2, -0.35]].forEach(p => {
            const w = new THREE.Mesh(wheelGeo, wheelMat);
            w.rotation.x = Math.PI / 2;
            w.position.set(p[0], p[1], -0.1); 
            boardGroup.add(w);
        });

        boardGroup.position.y = 4.8; 
        boardGroup.rotation.z = Math.PI / 12;
        boardGroup.rotation.y = -Math.PI / 6;
        lightstick.add(boardGroup);

        // --- 3. 손잡이 섹션 ---
        handleGroup = new THREE.Group();
        const connector = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.4, 0.6, 32), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        connector.position.y = 1.3;
        handleGroup.add(connector);

        const stick = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.1, 8.5, 32), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        stick.position.y = -3.2;
        handleGroup.add(stick);

        const button = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.1, 32), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        button.rotation.x = Math.PI / 2;
        button.position.set(0, -1, 1.35);
        handleGroup.add(button);

        lightstick.add(handleGroup);
        lightstick.position.y = -1; 

        window.addEventListener('resize', onWindowResize, false);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        let elapsedTime = clock.getElapsedTime();
        
        if (globe) globe.material.uniforms.time.value = elapsedTime;

        boardGroup.position.y = 4.8 + Math.sin(elapsedTime * 1.5) * 0.25;
        boardGroup.rotation.x = Math.sin(elapsedTime * 0.8) * 0.1;
        
        scene.rotation.y += 0.003;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
