<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KICKFLIP 3D BLUE HEMISPHERE</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, globeMesh, boardGroup, clock = new THREE.Clock();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 25);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 입체감을 위한 최소한의 조명
        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(5, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));

        const lightstick = new THREE.Group();
        scene.add(lightstick);

        // 1. 구체 생성 (정점 컬러 사용)
        const globeGeo = new THREE.SphereGeometry(2.8, 128, 128);
        const colors = [];
        const pos = globeGeo.attributes.position;

        for (let i = 0; i < pos.count; i++) {
            const y = pos.getY(i);
            if (y < 0) {
                // 아래쪽 절반: 확실한 푸른색 (RGB: 0, 0.4, 1.0)
                colors.push(0, 0.4, 1.0);
            } else {
                // 위쪽 절반: 흰색 (투명하게 보일 예정)
                colors.push(1, 1, 1);
            }
        }
        globeGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

        const globeMat = new THREE.MeshPhongMaterial({
            vertexColors: true, // 색칠한 정점 컬러 활성화
            transparent: true,
            opacity: 0.4,       // 푸른색이 잘 보이도록 투명도 조정
            shininess: 100,
            side: THREE.DoubleSide
        });

        globeMesh = new THREE.Mesh(globeGeo, globeMat);
        globeMesh.position.y = 4.5;
        lightstick.add(globeMesh);

        // 2. 스케이트보드
        boardGroup = new THREE.Group();
        const deck = new THREE.Mesh(
            new THREE.BoxGeometry(3.6, 0.2, 1.3),
            new THREE.MeshStandardMaterial({ color: 0x111111 })
        );
        boardGroup.add(deck);
        boardGroup.position.y = 4.8;
        lightstick.add(boardGroup);

        // 3. 손잡이
        const handle = new THREE.Mesh(
            new THREE.CylinderGeometry(1.4, 1.2, 8, 32),
            new THREE.MeshStandardMaterial({ color: 0x111111 })
        );
        handle.position.y = -2;
        lightstick.add(handle);

        lightstick.position.y = -1;
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        // 보드 움직임
        boardGroup.position.y = 4.8 + Math.sin(t * 1.5) * 0.3;

        // 구체 하단 가장자리 물결 변형
        const pos = globeMesh.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const y = pos.getY(i);
            const z = pos.getZ(i);

            // 중앙 경계선(y=0) 근처만 물결 효과
            if (y < 0.3 && y > -0.3) {
                const wave = Math.sin(x * 2.5 + t * 3.0) * 0.15;
                pos.setY(i, y + wave);
            }
        }
        pos.needsUpdate = true;

        scene.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
