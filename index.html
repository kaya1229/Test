<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KICKFLIP 3D GLOBE WAVE</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, boardGroup, globeMesh;
    let clock = new THREE.Clock();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 25);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(5, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        const lightstick = new THREE.Group();
        scene.add(lightstick);

        // 1. 유리 구체 (정점을 아주 촘촘하게 설정: 128x128)
        const globeGeo = new THREE.SphereGeometry(2.8, 128, 128);
        const globeMat = new THREE.MeshPhongMaterial({
            color: 0x0055ff, // 선명한 푸른색
            transparent: true,
            opacity: 0.3,
            shininess: 100,
            side: THREE.DoubleSide
        });
        globeMesh = new THREE.Mesh(globeGeo, globeMat);
        globeMesh.position.y = 4.5;
        lightstick.add(globeMesh);

        // 2. 스케이트보드 복구
        boardGroup = new THREE.Group();
        const deckShape = new THREE.Shape();
        deckShape.moveTo(-1.8, 0);
        deckShape.quadraticCurveTo(0, -0.1, 1.8, 0);
        deckShape.lineTo(2.0, 0.35);
        deckShape.lineTo(-2.0, 0.35);
        deckShape.closePath();

        const deck = new THREE.Mesh(
            new THREE.ExtrudeGeometry(deckShape, { depth: 1.3, bevelEnabled: true, bevelThickness: 0.05 }),
            new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.2 })
        );
        deck.position.set(0, 0, -0.65);
        boardGroup.add(deck);

        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.2, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        [[-1.2, 0.45], [1.2, 0.45], [-1.2, -0.45], [1.2, -0.45]].forEach(p => {
            const w = new THREE.Mesh(wheelGeo, wheelMat);
            w.rotation.x = Math.PI / 2;
            w.position.set(p[0], -0.2, p[1]);
            boardGroup.add(w);
        });

        boardGroup.position.y = 4.8;
        lightstick.add(boardGroup);

        // 3. 손잡이
        const handle = new THREE.Group();
        handle.add(new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.3, 8, 32), new THREE.MeshStandardMaterial({color: 0x111111})));
        handle.position.y = -2;
        lightstick.add(handle);

        lightstick.position.y = -1;
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        // 보드 움직임
        const bY = 4.8 + Math.sin(t * 1.5) * 0.4;
        const bTilt = Math.sin(t * 1.2) * 0.3;
        boardGroup.position.y = bY;
        boardGroup.rotation.z = bTilt;

        // --- [핵심] 구체 자체를 물결처럼 변형 ---
        const pos = globeMesh.geometry.attributes.position;
        const basePos = globeMesh.geometry.attributes.position.array; // 원래 위치 참조

        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const y = pos.getY(i);
            const z = pos.getZ(i);

            // 구체 하단 절반(y < 0) 부분만 타겟팅
            if (y < 0.2) {
                // 보드의 기울기와 높이에 연동된 파동 계산
                const waveScale = (5.5 - bY) * 0.5 + Math.abs(bTilt) * 0.5;
                const wave = Math.sin(x * 1.5 + t * 3.0) * waveScale * 0.3;
                
                // 정점의 Y값을 변형하여 '물결 모양 가장자리' 생성
                pos.setY(i, y + wave);
            }
        }
        pos.needsUpdate = true;

        scene.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
