<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KICKFLIP 3D NATIVE WAVE</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, boardGroup, waveMesh, clock = new THREE.Clock();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 25); 

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
        mainLight.position.set(5, 12, 10);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const lightstick = new THREE.Group();
        scene.add(lightstick);

        // 1. 투명 구체 (중심 y=4.5, 반지름 2.8)
        const globe = new THREE.Mesh(
            new THREE.SphereGeometry(2.8, 64, 64),
            new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.12, shininess: 100 })
        );
        globe.position.y = 4.5;
        lightstick.add(globe);

        // 2. 물결 레이어 (기본 재질 사용, 시작 위치 y=3.8)
        const waveGeo = new THREE.PlaneGeometry(5.2, 1.8, 64, 32); 
        const waveMat = new THREE.MeshPhongMaterial({
            color: 0x00f2ff,
            transparent: true,
            opacity: 0.5,
            side: THREE.DoubleSide
        });
        waveMesh = new THREE.Mesh(waveGeo, waveMat);
        waveMesh.rotation.x = -Math.PI / 2;
        waveMesh.position.set(0, 3.8, 0); 
        lightstick.add(waveMesh);

        // 3. 스케이트보드
        boardGroup = new THREE.Group();
        const deck = new THREE.Mesh(
            new THREE.ExtrudeGeometry(createDeckShape(), { depth: 1.3, bevelEnabled: true, bevelThickness: 0.02 }),
            new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 })
        );
        deck.position.set(0, 0, -0.65); 
        boardGroup.add(deck);
        boardGroup.position.y = 4.8;
        lightstick.add(boardGroup);

        // 4. 손잡이
        const handle = new THREE.Group();
        handle.add(new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.4, 0.5, 32), new THREE.MeshStandardMaterial({color: 0xffffff})));
        const stick = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.1, 8, 32), new THREE.MeshStandardMaterial({color: 0x111111}));
        stick.position.y = -4;
        handle.add(stick);
        handle.position.y = 1.2;
        lightstick.add(handle);

        lightstick.position.y = -1;
    }

    function createDeckShape() {
        const shape = new THREE.Shape();
        shape.moveTo(-1.8, 0);
        shape.quadraticCurveTo(0, -0.1, 1.8, 0);
        shape.lineTo(2.0, 0.35);
        shape.lineTo(-2.0, 0.35);
        shape.closePath();
        return shape;
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        
        // 보드 애니메이션
        const bY = 4.8 + Math.sin(t * 1.5) * 0.4;
        const bTilt = Math.sin(t * 1.2) * 0.3; 
        boardGroup.position.y = bY;
        boardGroup.rotation.z = bTilt; 

        // [물결 높이 제한 로직]
        const pos = waveMesh.geometry.attributes.position;
        const maxHeightOffset = 0.7; // 3.8(시작) + 0.7 = 4.5(구체 절반)

        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const y = pos.getY(i);
            
            const tiltImpact = -x * bTilt * 0.8; 
            const heightImpact = (5.5 - bY) * 0.4;

            let zWave = Math.sin(x * 2.0 + t * 4.0) * (0.2 + tiltImpact + heightImpact);
            let zDetail = Math.cos(y * 3.0 + t * 2.5) * 0.05;
            
            // 높이가 0.7(구체 절반 지점)을 넘지 않도록 상한선 고정
            pos.setZ(i, Math.min(zWave + zDetail, maxHeightOffset));
        }
        pos.needsUpdate = true;

        scene.rotation.y += 0.003;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
