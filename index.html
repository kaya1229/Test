<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKFLIP 3D NATIVE GLOBE WAVE</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; }
        #info { position: absolute; bottom: 5%; width: 100%; text-align: center; color: #ccc; font-size: 11px; pointer-events: none; font-family: sans-serif; letter-spacing: 1px;}
    </style>
</head>
<body>

<div id="info">KICKFLIP OFFICIAL LIGHTSTICK CONCEPT</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, boardGroup, globeMesh;
    let clock = new THREE.Clock();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 25); // 전체 뷰 최적화

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
        mainLight.position.set(5, 12, 10);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const lightstick = new THREE.Group();
        scene.add(lightstick);

        // --- [핵심] 1. 자체 물결 변형 투명 구체 (커스텀 쉐이더 제거) ---
        // 정점이 촘촘해야 구체 표면이 부드럽게 굽어집니다.
        const globeGeo = new THREE.SphereGeometry(2.8, 128, 128); 
        const globeMat = new THREE.MeshPhongMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.12, // 맑고 투명하게 조정
            shininess: 100,
            specular: 0xffffff
        });
        globeMesh = new THREE.Mesh(globeGeo, globeMat);
        globeMesh.position.y = 4.5;
        lightstick.add(globeMesh);

        // --- 2. 스케이트보드 (모양 바로잡기 및 너비 확장) ---
        boardGroup = new THREE.Group();
        
        // 데크: 날렵하고 대칭적인 킥플립 형태
        const deckShape = new THREE.Shape();
        deckShape.moveTo(-1.8, 0);
        deckShape.quadraticCurveTo(0, -0.1, 1.8, 0); // 메인 곡선
        deckShape.quadraticCurveTo(2.0, 0.1, 1.9, 0.3); // 테일 킥
        deckShape.lineTo(-1.9, 0.3);
        deckShape.quadraticCurveTo(-2.0, 0.1, -1.8, 0); // 노즈 킥
        deckShape.closePath();

        const extrudeSettings = { depth: 1.3, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.05 };
        const deckGeo = new THREE.ExtrudeGeometry(deckShape, extrudeSettings);
        const deckMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
        const deck = new THREE.Mesh(deckGeo, deckMat);
        deck.position.set(0, 0, -0.65); // 중앙 맞춤
        boardGroup.add(deck);

        // 바퀴 & 트럭 (데크 크기에 맞춰 조정)
        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.15, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const truckGeo = new THREE.BoxGeometry(0.1, 0.35, 0.85);
        const truckMat = new THREE.MeshStandardMaterial({ color: 0x444444 });

        [[-1.2, 0], [1.2, 0]].forEach(pos => {
            const truck = new THREE.Mesh(truckGeo, truckMat);
            truck.position.set(pos[0], -0.05, 0);
            boardGroup.add(truck);
            for(let z of [0.4, -0.4]) {
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.rotation.x = Math.PI / 2;
                w.position.set(pos[0], -0.22, z);
                boardGroup.add(w);
            }
        });

        boardGroup.position.y = 4.8;
        boardGroup.rotation.z = Math.PI / 10; 
        boardGroup.rotation.y = -Math.PI / 6;
        lightstick.add(boardGroup);

        // --- 3. 손잡이 섹션 ---
        const handle = new THREE.Group();
        handle.add(new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.4, 0.5, 32), new THREE.MeshStandardMaterial({color: 0xffffff})));
        const stick = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.1, 8, 32), new THREE.MeshStandardMaterial({color: 0x111111}));
        stick.position.y = -4;
        handle.add(stick);
        handle.position.y = 1.2;
        lightstick.add(handle);

        lightstick.position.y = -1.5; // 전체 하강

        window.addEventListener('resize', onWindowResize, false);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        
        // 보드 애니메이션 (y축 위치 계산)
        const bY = 4.8 + Math.sin(t * 1.5) * 0.3;
        boardGroup.position.y = bY;
        boardGroup.rotation.x = Math.sin(t * 0.8) * 0.1;
        
        // [핵심] 구체 표면 물결 변형 로직 (쉐이더 없이 구현)
        const pos = globeMesh.geometry.attributes.position;
        // 보드의 움직임에 따라 파동의 거세짐(amp)과 주파수(freq)를 조정
        const boardEffect = clamp(bY / 3.0, 0.0, 1.0); // 0.0 ~ 1.0 범위로 정규화
        const amp = mix(0.12, 0.04, boardEffect); // 거세짐: 0.12(거셈) ~ 0.04(잔잔함)
        const freq = mix(20.0, 10.0, boardEffect); // 주파수: 20.0(촘촘) ~ 10.0(느슨)

        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const y = pos.getY(i);
            const z = pos.getZ(i);
            
            // 구체의 로컬 위치를 기준으로 x, z 좌표를 이용해 파동 생성
            const d = Math.sqrt(x*x + z*z); // 중심으로부터의 거리 계산

            // 구체 하단부에서만 물결이 일도록 조건 추가 (y < -1.0)
            if (y < -1.0) {
                // 사인파를 조합하여 입체적인 물결 곡선 생성
                const wave = sin(d * freq + t * 3.0) * amp + sin(x * 12.0 - t * 2.0) * 0.03;
                
                // 정점의 원래 y값에 파동값을 더함
                const waveY = y + wave; 
                pos.setY(i, waveY);
            } else {
                // 상단부는 원래 형태 유지
                pos.setY(i, y);
            }
        }
        pos.needsUpdate = true; // 정점 데이터 업데이트 알림

        scene.rotation.y += 0.003;
        renderer.render(scene, camera);
    }

    // mapRange 대신 더 직관적인 mix, clamp 함수 구현
    function mix(a, b, t) { return a * (1 - t) + b * t; }
    function clamp(v, min, max) { return Math.min(Math.max(v, min), max); }
</script>
</body>
</html>
