<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KICKFLIP 3D WAVE GLOBE</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, boardGroup, globeMesh;
    let clock = new THREE.Clock();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 25); // 약간 위에서 내려다보는 시점

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 명암과 입체감을 위한 조명 설정 ---
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.8);
        mainLight.position.set(5, 15, 10);
        scene.add(mainLight);

        const fillLight = new THREE.PointLight(0x0055ff, 1.2); // 푸른색 보조광
        fillLight.position.set(-5, 5, 5);
        scene.add(fillLight);

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        const lightstick = new THREE.Group();
        scene.add(lightstick);

        // 1. 유리 구체 (정점을 촘촘하게 하여 물결을 부드럽게)
        const globeGeo = new THREE.SphereGeometry(2.8, 128, 128);
        const globeMat = new THREE.MeshPhongMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.15,
            shininess: 120,
            specular: 0x0055ff, // 반사광을 푸른색으로 설정
            side: THREE.DoubleSide,
            vertexColors: true // 정점마다 다른 명암(푸른색)을 주기 위함
        });

        // --- 구체 하단에 푸른색 명암(Vertex Color) 주입 ---
        const colors = [];
        const posAttr = globeGeo.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            const y = posAttr.getY(i);
            if (y < 0) {
                // 하단은 푸른색 (R:0, G:0.3, B:1.0)
                colors.push(0, 0.3, 1.0);
            } else {
                // 상단은 투명한 흰색
                colors.push(1, 1, 1);
            }
        }
        globeGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

        globeMesh = new THREE.Mesh(globeGeo, globeMat);
        globeMesh.position.y = 4.5;
        lightstick.add(globeMesh);

        // 2. 스케이트보드 (날렵한 형태로 복구)
        boardGroup = new THREE.Group();
        const deckShape = new THREE.Shape();
        deckShape.moveTo(-1.8, 0.05);
        deckShape.lineTo(1.8, 0.05);
        deckShape.quadraticCurveTo(2.1, 0.1, 1.9, 0.4);
        deckShape.lineTo(-1.9, 0.4);
        deckShape.quadraticCurveTo(-2.1, 0.1, -1.8, 0.05);

        const deck = new THREE.Mesh(
            new THREE.ExtrudeGeometry(deckShape, { depth: 1.3, bevelEnabled: true, bevelThickness: 0.05 }),
            new THREE.MeshStandardMaterial({ color: 0x151515, metalness: 0.8, roughness: 0.2 })
        );
        deck.position.set(0, 0, -0.65);
        boardGroup.add(deck);

        // 바퀴
        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.2, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
        [[-1.2, 0.45], [1.2, 0.45], [-1.2, -0.45], [1.2, -0.45]].forEach(p => {
            const w = new THREE.Mesh(wheelGeo, wheelMat);
            w.rotation.x = Math.PI / 2;
            w.position.set(p[0], -0.2, p[1]);
            boardGroup.add(w);
        });

        boardGroup.position.y = 4.8;
        lightstick.add(boardGroup);

        // 3. 손잡이
        const handle = new THREE.Group();
        handle.add(new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.3, 8, 32), new THREE.MeshStandardMaterial({color: 0x111111})));
        handle.position.y = -2;
        lightstick.add(handle);

        lightstick.position.y = -1;
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        // 보드 애니메이션
        const bY = 4.8 + Math.sin(t * 1.5) * 0.4;
        const bTilt = Math.sin(t * 1.2) * 0.3;
        boardGroup.position.y = bY;
        boardGroup.rotation.z = bTilt;

        // --- [핵심] 구체 하단 가장자리 물결 변형 ---
        const pos = globeMesh.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const y = pos.getY(i);
            const z = pos.getZ(i);

            // 구체의 정중앙 부근(y=0)의 정점들을 물결치게 만들어 경계선 형성
            if (y < 0.5 && y > -2.8) {
                const dist = Math.sqrt(x*x + z*z);
                const wave = Math.sin(dist * 2.0 - t * 3.0) * 0.15;
                
                // y값이 0에 가까울수록 물결의 영향을 크게 줌 (가장자리 강조)
                const edgeForce = 1.0 - Math.abs(y) / 2.8;
                pos.setY(i, y + wave * edgeForce);
            }
        }
        pos.needsUpdate = true;

        scene.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
