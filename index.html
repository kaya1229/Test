<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KICKFLIP 3D VERTICAL WHEELS</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, boardGroup, globe;
    let clock = new THREE.Clock();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 22); 

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        const lightstick = new THREE.Group();
        scene.add(lightstick);

        // --- 1. 데크 (Deck) ---
        boardGroup = new THREE.Group();
        const w = 1.3, l = 4.2, r = w / 2;
        const deckShape = new THREE.Shape();
        deckShape.absarc(l/2 - r, 0, r, Math.PI * 1.5, Math.PI * 0.5, false);
        deckShape.absarc(-l/2 + r, 0, r, Math.PI * 0.5, Math.PI * 1.5, false);
        deckShape.closePath();

        const deckGeo = new THREE.ExtrudeGeometry(deckShape, { depth: 0.08, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02 });
        const deckMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.2 });
        const deck = new THREE.Mesh(deckGeo, deckMat);
        
        // 데크를 X-Y 평면으로 눕힘
        deck.rotation.x = Math.PI / 2; 
        boardGroup.add(deck);

        // --- 2. 축(Truck)과 바퀴(Wheel) ---
        const truckGeo = new THREE.CylinderGeometry(0.06, 0.06, 1.2, 16);
        const truckMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.15, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });

        const truckXPositions = [-1.3, 1.3]; // 앞뒤 축 위치

        truckXPositions.forEach(xPos => {
            // 축(Truck Shaft) 생성
            const truck = new THREE.Mesh(truckGeo, truckMat);
            
            // [방향] 데크가 눕혀진 상태에서 축을 짧은 면 방향으로 눕힘
            truck.rotation.x = Math.PI / 2; 
            // [위치] 데크의 아래쪽(Z축 음수 방향)으로 내림
            truck.position.set(xPos, 0, -0.2); 
            boardGroup.add(truck);

            // 바퀴(Wheel) 생성
            const wheelDist = 0.55; 
            [wheelDist, -wheelDist].forEach(yPos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                
                // [수직 정렬] 바퀴는 축과 90도를 이뤄야 함
                // 축이 이미 rotation.x를 했으므로, 바퀴는 기본 서 있는 상태에서 
                // 굴러가는 면이 앞(X)을 보게만 조절 (rotation.z 사용)
                wheel.rotation.z = Math.PI / 2; 
                
                // [위치] 축의 양 끝(yPos)에 정확히 배치
                wheel.position.set(xPos, yPos, -0.2); 
                boardGroup.add(wheel);
            });
        });

        boardGroup.position.y = 4.5;
        boardGroup.rotation.z = Math.PI / 10;
        boardGroup.rotation.y = -Math.PI / 6;
        lightstick.add(boardGroup);

        // --- 3. 손잡이 ---
        const stick = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.1, 8.5, 32), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        stick.position.y = -3.5;
        lightstick.add(stick);
        
        lightstick.position.y = -1;

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        let elapsedTime = clock.getElapsedTime();
        boardGroup.position.y = 4.5 + Math.sin(elapsedTime * 1.5) * 0.2;
        scene.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
