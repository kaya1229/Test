<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKFLIP 3D ULTIMATE</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; }
        #info { position: absolute; bottom: 5%; width: 100%; text-align: center; color: #ccc; font-size: 11px; pointer-events: none; font-family: sans-serif; letter-spacing: 1px;}
    </style>
</head>
<body>

<div id="info">KICKFLIP OFFICIAL LIGHTSTICK CONCEPT</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, boardGroup, globeMesh, waveMesh;
    let clock = new THREE.Clock();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        
        // 1. 카메라 줌아웃: 전체 시야 확보를 위해 거리 조정 (z=25)
        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 25); 

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- 조명 전면 수정 (입체감 복원) ---
        
        // 주 조명: 그림자를 만들어내는 강한 직사광
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
        mainLight.position.set(5, 10, 7.5);
        scene.add(mainLight);
        
        // 반사광: 구체의 영롱함을 위해 반대편에 PointLight 추가
        const sideLight = new THREE.PointLight(0xffffff, 0.8);
        sideLight.position.set(-10, 5, 5);
        scene.add(sideLight);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5)); // 주변광 축소

        const lightstick = new THREE.Group();
        scene.add(lightstick);

        // --- 2. 투명 구체 (유리알 느낌 최적화) ---
        const globeGeo = new THREE.SphereGeometry(2.8, 64, 64);
        const globeMat = new THREE.MeshPhongMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.1, // 맑고 투명하게 조정
            shininess: 120,
            specular: 0xffffff
        });
        globeMesh = new THREE.Mesh(globeGeo, globeMat);
        globeMesh.position.y = 4.5;
        lightstick.add(globeMesh);

        // --- 3. 명확한 파도 물결 레이어 (커스텀 쉐이더) ---
        
        // 유니폼 변수: 보드의 위치와 시간에 따라 곡률 조정
        const waveUniforms = {
            time: { value: 0 },
            boardY: { value: 0 }, // 보드의 실시간 Y축 위치
            color: { value: new THREE.Color(0x00f2ff) }, // 시안 블루 물결
            opacity: { value: 0.35 } // 눈에 띄게 투명도 조절
        };

        const waveVertexShader = `
            varying vec2 vUv;
            varying vec3 vPosition;
            uniform float time;
            uniform float boardY;

            void main() {
                vUv = uv;
                vPosition = position;

                // 보드의 움직임에 따라 파동의 거세짐(amp)과 주파수(freq)를 조정
                // 보드가 낮을수록 물결이 더 거세게
                float boardEffect = clamp(boardY / 3.0, 0.0, 1.0); // 0.0 ~ 1.0 범위로 정규화
                float amp = mix(0.12, 0.03, boardEffect); // 거세짐: 0.12(거셈) ~ 0.03(잔잔함)
                float freq = mix(20.0, 10.0, boardEffect); // 주파수: 20.0(촘촘) ~ 10.0(느슨)

                // 사인파를 조합하여 역동적인 물결 곡선 생성
                float wave = sin(vUv.x * freq + time * 3.0) * amp + sin(vUv.x * 12.0 - time * 2.0) * 0.03;
                
                // 물결의 기본 높이(0.5)에서 파동을 더함
                float waveY = 0.5 + wave; 

                gl_Position = projectionMatrix * modelViewMatrix * vec4(position.x, waveY, position.z, 1.0);
            }
        `;

        const waveFragmentShader = `
            uniform vec3 color;
            uniform float opacity;
            varying vec2 vUv;
            
            void main() {
                // 부드러운 물결 가장자리를 위해 가장자리 옅어지게 처리
                float edge = smoothstep(0.0, 0.1, vUv.x) * smoothstep(1.0, 0.9, vUv.x);
                gl_FragColor = vec4(color, opacity * edge);
            }
        `;

        // 구체 내부를 가로지르는 촘촘한 평면 지오메트리
        const waveGeo = new THREE.PlaneGeometry(5.0, 0.8, 128, 64);
        const waveMat = new THREE.ShaderMaterial({
            uniforms: waveUniforms,
            vertexShader: waveVertexShader,
            fragmentShader: waveFragmentShader,
            transparent: true,
            depthWrite: false, // 투명도 겹침 문제 해결
            side: THREE.DoubleSide
        });

        waveMesh = new THREE.Mesh(waveGeo, waveMat);
        waveMesh.position.set(0, 3.8, 0.3); // 보드 아래, 구체 내부에 배치
        lightstick.add(waveMesh);

        // --- 4. 정밀한 스케이트보드 (모양 바로잡기 및 너비 확장) ---
        boardGroup = new THREE.Group();
        
        // 데크: 날렵하고 대칭적인 킥플립 형태
        const deckShape = new THREE.Shape();
        deckShape.moveTo(-1.8, 0);
        deckShape.quadraticCurveTo(0, -0.1, 1.8, 0); // 메인 곡선
        deckShape.quadraticCurveTo(2.0, 0.1, 1.9, 0.3); // 테일 킥
        deckShape.lineTo(-1.9, 0.3);
        deckShape.quadraticCurveTo(-2.0, 0.1, -1.8, 0); // 노즈 킥
        deckShape.closePath();

        const extrudeSettings = { depth: 1.3, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.05 };
        const deckGeo = new THREE.ExtrudeGeometry(deckShape, extrudeSettings);
        const deckMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
        const deck = new THREE.Mesh(deckGeo, deckMat);
        deck.position.set(0, 0, -0.65); // 중앙 맞춤
        boardGroup.add(deck);

        // 바퀴 & 트럭 (데크 크기에 맞춰 조정)
        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.15, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const truckGeo = new THREE.BoxGeometry(0.1, 0.35, 0.85);
        const truckMat = new THREE.MeshStandardMaterial({ color: 0x444444 });

        [[-1.2, 0], [1.2, 0]].forEach(pos => {
            const truck = new THREE.Mesh(truckGeo, truckMat);
            truck.position.set(pos[0], -0.05, 0);
            boardGroup.add(truck);
            for(let z of [0.4, -0.4]) {
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.rotation.x = Math.PI / 2;
                w.position.set(pos[0], -0.22, z);
                boardGroup.add(w);
            }
        });

        boardGroup.position.y = 4.8;
        boardGroup.rotation.z = Math.PI / 10; // 튀어오르는 각도
        boardGroup.rotation.y = -Math.PI / 6;
        lightstick.add(boardGroup);

        // --- 5. 손잡이 섹션 ---
        const handle = new THREE.Group();
        // 체크무늬 커넥터
        const connGeo = new THREE.CylinderGeometry(1.6, 1.45, 0.5, 32);
        const connMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const connector = new THREE.Mesh(connGeo, connMat);
        connector.position.y = 1.3;
        handle.add(connector);

        // 손잡이 본체 (길이 통합)
        const stickGeo = new THREE.CylinderGeometry(1.3, 1.15, 8.5, 32);
        const stickMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.6 });
        const stick = new THREE.Mesh(stickGeo, stickMat);
        stick.position.y = -3.2;
        handle.add(stick);

        // 버튼
        const btnGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.1, 32);
        const btnMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const button = new THREE.Mesh(btnGeo, btnMat);
        button.rotation.x = Math.PI / 2;
        button.position.set(0, -1, 1.4); // 버튼 돌출
        handle.add(button);

        lightstick.add(handle);
        lightstick.position.y = -1.5; // 전체 하강

        window.addEventListener('resize', onWindowResize, false);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        
        // 보드 애니메이션 (y축 위치 계산)
        const bY = 4.8 + Math.sin(t * 1.5) * 0.3;
        boardGroup.position.y = bY;
        boardGroup.rotation.x = Math.sin(t * 0.8) * 0.1;
        
        // [핵심] 파도 레이어 유니폼 변수 업데이트
        waveMesh.material.uniforms.time.value = t;
        waveMesh.material.uniforms.boardY.value = bY; // 보드의 실시간 Y 위치 전달

        scene.rotation.y += 0.003;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
