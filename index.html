<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKFLIP 3D TRUCK FIXED</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; }
        #info { position: absolute; bottom: 5%; width: 100%; text-align: center; color: #bbb; font-size: 11px; pointer-events: none; font-family: sans-serif; letter-spacing: 1px;}
    </style>
</head>
<body>

<div id="info">KICKFLIP OFFICIAL LIGHTSTICK CONCEPT</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, boardGroup, globe,lightstick;
    let clock = new THREE.Clock();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 28); 

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.3);
        mainLight.position.set(5, 10, 7.5);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));

        lightstick = new THREE.Group();
        scene.add(lightstick);

        // --- 1. 푸른색 물결 쉐이더 구체 ---
        const waveUniforms = {
            time: { value: 0 },
            colorTop: { value: new THREE.Color(0xffffff) },
            colorBottom: { value: new THREE.Color(0x0055ff) }
        };

        const globeGeo = new THREE.SphereGeometry(2.8, 128, 128);
        const globeMat = new THREE.ShaderMaterial({
            uniforms: waveUniforms,
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform float time; uniform vec3 colorTop; uniform vec3 colorBottom;
                varying vec2 vUv;
                void main() {
                    float wave = sin(vUv.x * 12.0 + time * 2.5) * 0.03 + sin(vUv.x * 6.0 - time * 1.5) * 0.02;
                    float edge = 0.35 + wave;
                    float mixFactor = smoothstep(edge - 0.01, edge + 0.01, vUv.y);
                    gl_FragColor = vec4(mix(colorBottom, colorTop, mixFactor), mix(0.5, 0.1, mixFactor));
                }
            `,
            transparent: true, depthWrite: false, side: THREE.DoubleSide
        });
        globe = new THREE.Mesh(globeGeo, globeMat);
        globe.position.y = 4.5;
        lightstick.add(globe);

        // --- 2. 스케이트보드 (데크 + 트럭 + 바퀴) ---
        boardGroup = new THREE.Group();

                // --- [데크: 3단 분리 킥 구조로 교체] ---
        const flatLen = 2.5; // 중앙 평면부 길이
        const kickLen = 0.85; // 양 끝 들린 부분 길이

        // 1. 중앙 평면부 (Flat)
        const flatShape = new THREE.Shape();
        flatShape.moveTo(-flatLen/2, -w/2);
        flatShape.lineTo(flatLen/2, -w/2);
        flatShape.lineTo(flatLen/2, w/2);
        flatShape.lineTo(-flatLen/2, w/2);
        flatShape.closePath();

        const deckGeo = new THREE.ExtrudeGeometry(flatShape, { depth: 0.05, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02 });
        const deckMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.2 });
        const deckMid = new THREE.Mesh(deckGeo, deckMat);
        deckMid.rotation.x = Math.PI / 2;
        boardGroup.add(deckMid);

        // 2. 킥 조각 공통 형태 (반원)
        const kickShape = new THREE.Shape();
        kickShape.absarc(0, 0, w/2, Math.PI * 1.5, Math.PI * 0.5, false);
        kickShape.lineTo(0, w/2);
        kickShape.lineTo(0, -w/2);
        const kickGeo = new THREE.ExtrudeGeometry(kickShape, { depth: 0.05, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02 });

        // 3. 앞쪽 킥 (Nose) 배치 및 꺾기
        const nose = new THREE.Mesh(kickGeo, deckMat);
        nose.rotation.x = Math.PI / 2;
        nose.position.x = flatLen / 2; 
        nose.rotation.z = -0.3; // <--- 위로 꺾이는 각도
        boardGroup.add(nose);

        // 4. 뒤쪽 킥 (Tail) 배치 및 꺾기
        const tail = new THREE.Mesh(kickGeo, deckMat);
        tail.rotation.x = Math.PI / 2;
        tail.rotation.y = Math.PI; // 반대 방향 회전
        tail.position.x = -flatLen / 2; 
        tail.rotation.z = -0.3; // <--- 위로 꺾이는 각도
        boardGroup.add(tail);

        // [트럭 및 바퀴]
        const truckGeo = new THREE.CylinderGeometry(0.06, 0.06, 1.2, 16);
        const truckMat = new THREE.MeshStandardMaterial({ color: 0x777777 });
        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.15, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0xffffff });

        const truckXPositions = [-1.3, 1.3];

        truckXPositions.forEach(x => {
            // 트럭 뭉치(Truck Assembly)를 위한 그룹 생성
            const truckAssembly = new THREE.Group();
            
            // 1. 실제 금속 축(Truck) 생성
            const truckShaft = new THREE.Mesh(truckGeo, truckMat);
            // 실린더는 기본적으로 Y축 방향임. 데크 너비 방향에 맞춤.
            truckAssembly.add(truckShaft);

            // 2. 바퀴 생성 (축의 양 끝단에 배치)
            const wheelDist = 0.55; // 축의 중심에서 바퀴까지 거리
            
            [wheelDist, -wheelDist].forEach(y => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                // 바퀴를 축 방향에 맞춰서 90도 회전
                //wheel.rotation.z = Math.PI / 2; 
                wheel.position.y = y; // 축(Shaft)을 따라 이동
                truckAssembly.add(wheel);
            });

            // 3. 트럭 뭉치 전체 회전 및 배치
            // 데크 아래에 붙이기 위해 뭉치 전체를 X축으로 눕힘
            truckAssembly.rotation.x = Math.PI / 2;
            truckAssembly.position.set(x, -0.3, 0); // 데크 아래에 위치
            
            boardGroup.add(truckAssembly);
        });

        boardGroup.position.y = 5.3; 
        boardGroup.rotation.z = Math.PI / 12;
        boardGroup.rotation.y = -Math.PI / 6;
        lightstick.add(boardGroup);

                // --- 3. 손잡이 (입체적인 2단 구조로 복구) ---
        const handleGroup = new THREE.Group();

        // [상단] 흰색 커넥터 (구체와 스틱을 연결하는 입체적인 마디)
        const connector = new THREE.Mesh(
            new THREE.CylinderGeometry(1.6, 1.4, 0.7, 32), 
            new THREE.MeshStandardMaterial({ 
                color: 0xffffff, 
                roughness: 0.3, // 약간의 광택을 주어 입체감을 살림
                metalness: 0.1 
            })
        );
        connector.position.y = 1.3;
        handleGroup.add(connector);

        // [하단] 검은색 본체 스틱
        const stick = new THREE.Mesh(
            new THREE.CylinderGeometry(1.3, 1.1, 8.5, 32), 
            new THREE.MeshStandardMaterial({ 
                color: 0x111111, 
                roughness: 0.5, 
                metalness: 0.2 
            })
        );
        stick.position.y = -3.2;
        handleGroup.add(stick);

        lightstick.add(handleGroup);
        lightstick.position.y = -1;}


    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
    requestAnimationFrame(animate);
    let elapsedTime = clock.getElapsedTime();
    
    if (globe) globe.material.uniforms.time.value = elapsedTime;

    // 보드 위아래 애니메이션 (높이 5.3 기준)
    if (boardGroup) boardGroup.position.y = 5.3 + Math.sin(elapsedTime * 1.5) * 0.25;
    
    // [수정] 응원봉 전체를 회전시켜 손잡이가 입체적으로 돌아가게 함
    if (lightstick) {
        lightstick.rotation.y += 0.005; // 회전 속도 조절
    }
    
    renderer.render(scene, camera);
}
        


</script>
</body>
</html>
