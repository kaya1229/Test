<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKFLIP 3D WAVE FIX</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; }
        #info { position: absolute; bottom: 5%; width: 100%; text-align: center; color: #ccc; font-size: 11px; pointer-events: none; font-family: sans-serif; letter-spacing: 1px;}
    </style>
</head>
<body>

<div id="info">KICKFLIP OFFICIAL LIGHTSTICK CONCEPT</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, boardGroup, globe, waveMesh;
    let clock = new THREE.Clock();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 25); 

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
        mainLight.position.set(5, 12, 10);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const lightstick = new THREE.Group();
        scene.add(lightstick);

        // 1. 투명 구체 (완전 투명 유리)
        const globeGeo = new THREE.SphereGeometry(2.8, 64, 64);
        const globeMat = new THREE.MeshPhongMaterial({
            color: 0xffffff, transparent: true, opacity: 0.15, shininess: 100
        });
        globe = new THREE.Mesh(globeGeo, globeMat);
        globe.position.y = 4.5;
        lightstick.add(globe);

        // 2. 자체 변형 물결 레이어 (커스텀 쉐이더 제거)
        // 정점이 많아야 부드럽게 굽어집니다.
        const waveGeo = new THREE.PlaneGeometry(5.2, 1.0, 32, 32); 
        const waveMat = new THREE.MeshPhongMaterial({
            color: 0xcccccc, // 회색 톤
            transparent: true,
            opacity: 0.4,
            side: THREE.DoubleSide,
            flatShading: false
        });
        waveMesh = new THREE.Mesh(waveGeo, waveMat);
        waveMesh.rotation.x = -Math.PI / 2; // 가로로 눕힘
        waveMesh.position.set(0, 3.8, 0); 
        lightstick.add(waveMesh);

        // 3. 스케이트보드
        boardGroup = new THREE.Group();
        const deckShape = new THREE.Shape();
        deckShape.moveTo(-1.8, 0);
        deckShape.quadraticCurveTo(0, -0.1, 1.8, 0);
        deckShape.lineTo(2.0, 0.4);
        deckShape.lineTo(-2.0, 0.4);
        deckShape.closePath();

        const deckGeo = new THREE.ExtrudeGeometry(deckShape, { depth: 1.3, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.05 });
        const deckMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
        const deck = new THREE.Mesh(deckGeo, deckMat);
        deck.position.set(0, 0, -0.65); 
        boardGroup.add(deck);

        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.15, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        [[-1.2, 0.4], [1.2, 0.4], [-1.2, -0.4], [1.2, -0.4]].forEach(p => {
            const w = new THREE.Mesh(wheelGeo, wheelMat);
            w.rotation.x = Math.PI / 2;
            w.position.set(p[0], -0.2, p[1]);
            boardGroup.add(w);
        });

        boardGroup.position.y = 4.8;
        boardGroup.rotation.z = 0.25; 
        boardGroup.rotation.y = -0.4;
        lightstick.add(boardGroup);

        // 4. 손잡이
        const handle = new THREE.Group();
        handle.add(new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.4, 0.5, 32), new THREE.MeshStandardMaterial({color: 0xffffff})));
        const stick = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.1, 8, 32), new THREE.MeshStandardMaterial({color: 0x111111}));
        stick.position.y = -4;
        handle.add(stick);
        handle.position.y = 1.2;
        lightstick.add(handle);

        lightstick.position.y = -1;

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        
        // 보드 애니메이션
        const bY = 4.8 + Math.sin(t * 1.5) * 0.35;
        boardGroup.position.y = bY;

        // 물결 정점 직접 변형 (쉐이더 없이 구현)
        const pos = waveMesh.geometry.attributes.position;
        const boardImpact = mapRange(bY, 4.4, 5.2, 1.5, 0.4); // 보드 높이에 따른 파동 강도

        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const y = pos.getY(i);
            
            // X축 위치와 시간을 이용해 사인파 생성
            const zWave = Math.sin(x * 1.5 + t * 3.0) * 0.3 * boardImpact;
            const extraWave = Math.cos(y * 2.0 + t * 2.0) * 0.1 * boardImpact;
            
            pos.setZ(i, zWave + extraWave);
        }
        pos.needsUpdate = true; // 정점 데이터 업데이트 알림

        scene.rotation.y += 0.003;
        renderer.render(scene, camera);
    }

    function mapRange(v, iMin, iMax, oMin, oMax) {
        return (v - iMin) * (oMax - oMin) / (inMax - inMin) + oMin;
    }
    // 위 mapRange 오타 수정 (inMax -> iMax)
    function mapRange(v, iM, iX, oM, oX) { return (v - iM) * (oX - oM) / (iX - iM) + oM; }
</script>
</body>
</html>
