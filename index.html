<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKFLIP 3D SINGLE LAYER WAVE</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; }
        #info { position: absolute; bottom: 5%; width: 100%; text-align: center; color: #ccc; font-size: 11px; pointer-events: none; font-family: sans-serif; letter-spacing: 1px;}
    </style>
</head>
<body>

<div id="info">KICKFLIP OFFICIAL LIGHTSTICK CONCEPT</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, boardGroup, globe, waveLayer;
    let clock = new THREE.Clock();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 25); // 넉넉하게 줌아웃

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // 조명 설정
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
        mainLight.position.set(5, 12, 10);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));

        const lightstick = new THREE.Group();
        scene.add(lightstick);

        // 1. 투명 유리 구체
        const globeGeo = new THREE.SphereGeometry(2.8, 64, 64);
        const globeMat = new THREE.MeshPhongMaterial({
            color: 0xffffff, transparent: true, opacity: 0.12, shininess: 100
        });
        globe = new THREE.Mesh(globeGeo, globeMat);
        globe.position.y = 4.5;
        lightstick.add(globe);

        // 2. 단일 평면 파도 레이어 (쉐이더)
        const waveUniforms = {
            time: { value: 0 },
            intensity: { value: 1.0 }, // 보드 위치에 따른 곡률 강도
            color: { value: new THREE.Color(0x222222) }
        };

        const waveVertexShader = `
            varying vec2 vUv;
            uniform float time;
            uniform float intensity;
            void main() {
                vUv = uv;
                // 사인파를 조합하여 물결 곡선 생성
                float wave = sin(position.x * 2.5 + time * 3.0) * 0.25 * intensity;
                wave += cos(position.x * 5.0 - time * 2.0) * 0.1 * intensity;
                
                // 정점의 Y값을 파동값으로 변경 (하나의 선/면처럼 보이게)
                vec3 newPos = vec3(position.x, position.y + wave, position.z);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(newPos, 1.0);
            }
        `;

        const waveFragmentShader = `
            varying vec2 vUv;
            uniform vec3 color;
            void main() {
                // 면의 투명도 설정 (눈에 보이도록 0.4)
                gl_FragColor = vec4(color, 0.4);
            }
        `;

        // 얇고 긴 평면 면을 생성
        const waveGeo = new THREE.PlaneGeometry(5.2, 0.4, 128, 2);
        const waveMat = new THREE.ShaderMaterial({
            uniforms: waveUniforms,
            vertexShader: waveVertexShader,
            fragmentShader: waveFragmentShader,
            transparent: true,
            side: THREE.DoubleSide
        });

        waveLayer = new THREE.Mesh(waveGeo, waveMat);
        waveLayer.position.set(0, 3.5, 0.5); // 보드 바로 아래 배치
        lightstick.add(waveLayer);

        // 3. 스케이트보드
        boardGroup = new THREE.Group();
        const deckShape = new THREE.Shape();
        deckShape.moveTo(-1.8, 0);
        deckShape.quadraticCurveTo(0, -0.1, 1.8, 0);
        deckShape.lineTo(2.0, 0.3);
        deckShape.lineTo(-2.0, 0.3);
        deckShape.closePath();

        const deckGeo = new THREE.ExtrudeGeometry(deckShape, { depth: 1.2, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.05 });
        const deckMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.2 });
        const deck = new THREE.Mesh(deckGeo, deckMat);
        deck.position.set(0, 0, -0.6); 
        boardGroup.add(deck);

        // 바퀴
        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.15, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        [[-1.2, 0.35], [1.2, 0.35], [-1.2, -0.35], [1.2, -0.35]].forEach(p => {
            const w = new THREE.Mesh(wheelGeo, wheelMat);
            w.rotation.x = Math.PI / 2;
            w.position.set(p[0], -0.2, p[1]);
            boardGroup.add(w);
        });

        boardGroup.position.y = 4.8;
        boardGroup.rotation.z = 0.2; 
        boardGroup.rotation.y = -0.5;
        lightstick.add(boardGroup);

        // 4. 손잡이
        const handleGroup = new THREE.Group();
        const conn = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.4, 0.6, 32), new THREE.MeshStandardMaterial({color: 0xffffff}));
        conn.position.y = 1.3;
        handleGroup.add(conn);

        const stick = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.1, 8, 32), new THREE.MeshStandardMaterial({color: 0x111111}));
        stick.position.y = -3;
        handleGroup.add(stick);

        lightstick.add(handleGroup);
        lightstick.position.y = -1;

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        let t = clock.getElapsedTime();
        
        // 보드 애니메이션
        let bY = 4.8 + Math.sin(t * 1.5) * 0.4;
        boardGroup.position.y = bY;
        
        // 보드 높이에 따른 물결 강도 조절 (보드가 낮을수록 세짐)
        let intensity = mapRange(bY, 4.4, 5.2, 2.0, 0.5);
        waveLayer.material.uniforms.intensity.value = intensity;
        waveLayer.material.uniforms.time.value = t;

        scene.rotation.y += 0.003;
        renderer.render(scene, camera);
    }

    function mapRange(value, inMin, inMax, outMin, outMax) {
        return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
    }
</script>
</body>
</html>
