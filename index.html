<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKFLIP 3D SHARP WAVE</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; }
        #info { position: absolute; bottom: 5%; width: 100%; text-align: center; color: #ccc; font-size: 11px; pointer-events: none; font-family: sans-serif; letter-spacing: 1px;}
    </style>
</head>
<body>

<div id="info">SHARP EDGE WAVE SYSTEM</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, boardGroup, globe, waveMesh;
    let clock = new THREE.Clock();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 25); 

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
        mainLight.position.set(5, 12, 10);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const lightstick = new THREE.Group();
        scene.add(lightstick);

        // 1. 투명 구체
        globe = new THREE.Mesh(
            new THREE.SphereGeometry(2.8, 64, 64),
            new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.1, shininess: 100 })
        );
        globe.position.y = 4.5;
        lightstick.add(globe);

        // 2. 명확한 가장자리를 가진 물결 (커스텀 쉐이더)
        const waveUniforms = {
            time: { value: 0 },
            color: { value: new THREE.Color(0x333333) }, // 시크한 다크 그레이
            opacity: { value: 0.6 },
            bTilt: { value: 0 },
            bY: { value: 0 }
        };

        const waveVertexShader = `
            varying vec2 vUv;
            uniform float time;
            uniform float bTilt;
            uniform float bY;
            void main() {
                vUv = uv;
                // 보드 기울기에 따른 정점별 가중치 계산
                float xOffset = position.x;
                float tiltImpact = -xOffset * bTilt * 1.2;
                float heightImpact = (5.5 - bY) * 0.5;

                // 역동적인 파동 생성
                float wave = sin(position.x * 2.0 + time * 4.0) * (0.25 + tiltImpact + heightImpact);
                wave += cos(position.y * 3.0 + time * 2.0) * 0.1;

                vec3 newPos = vec3(position.x, position.y, position.z + wave);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(newPos, 1.0);
            }
        `;

        const waveFragmentShader = `
            varying vec2 vUv;
            uniform vec3 color;
            uniform float opacity;
            void main() {
                // step 함수를 사용하여 가장자리를 칼같이 자름 (UV 경계선 명확화)
                float edgeX = step(0.01, vUv.x) * step(vUv.x, 0.99);
                float edgeY = step(0.01, vUv.y) * step(vUv.y, 0.99);
                float alpha = opacity * edgeX * edgeY;

                if (alpha < 0.1) discard; // 경계 밖은 아예 그리지 않음 (Sharp Edge)
                gl_FragColor = vec4(color, alpha);
            }
        `;

        const waveGeo = new THREE.PlaneGeometry(5.2, 1.8, 128, 64);
        const waveMat = new THREE.ShaderMaterial({
            uniforms: waveUniforms,
            vertexShader: waveVertexShader,
            fragmentShader: waveFragmentShader,
            transparent: true,
            side: THREE.DoubleSide
        });

        waveMesh = new THREE.Mesh(waveGeo, waveMat);
        waveMesh.rotation.x = -Math.PI / 2;
        waveMesh.position.set(0, 3.8, 0); 
        lightstick.add(waveMesh);

        // 3. 스케이트보드
        boardGroup = new THREE.Group();
        const deckShape = new THREE.Shape();
        deckShape.moveTo(-1.8, 0);
        deckShape.quadraticCurveTo(0, -0.1, 1.8, 0);
        deckShape.lineTo(2.0, 0.35);
        deckShape.lineTo(-2.0, 0.35);
        deckShape.closePath();

        const deck = new THREE.Mesh(
            new THREE.ExtrudeGeometry(deckShape, { depth: 1.3, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.05 }),
            new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 })
        );
        deck.position.set(0, 0, -0.65); 
        boardGroup.add(deck);

        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.15, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        [[-1.2, 0.4], [1.2, 0.4], [-1.2, -0.4], [1.2, -0.4]].forEach(p => {
            const w = new THREE.Mesh(wheelGeo, wheelMat);
            w.rotation.x = Math.PI / 2;
            w.position.set(p[0], -0.2, p[1]);
            boardGroup.add(w);
        });

        boardGroup.position.y = 4.8;
        lightstick.add(boardGroup);

        // 4. 손잡이
        const handle = new THREE.Group();
        handle.add(new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.4, 0.5, 32), new THREE.MeshStandardMaterial({color: 0xffffff})));
        const stick = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.1, 8, 32), new THREE.MeshStandardMaterial({color: 0x111111}));
        stick.position.y = -4;
        handle.add(stick);
        handle.position.y = 1.2;
        lightstick.add(handle);

        lightstick.position.y = -1;

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        
        const bY = 4.8 + Math.sin(t * 1.5) * 0.4;
        const bTilt = Math.sin(t * 1.2) * 0.3; 
        
        boardGroup.position.y = bY;
        boardGroup.rotation.z = bTilt; 

        // 쉐이더 유니폼 업데이트
        waveMesh.material.uniforms.time.value = t;
        waveMesh.material.uniforms.bTilt.value = bTilt;
        waveMesh.material.uniforms.bY.value = bY;

        scene.rotation.y += 0.003;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
