<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKFLIP 3D TILT WAVE</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; }
        #info { position: absolute; bottom: 5%; width: 100%; text-align: center; color: #ccc; font-size: 11px; pointer-events: none; font-family: sans-serif; letter-spacing: 1px;}
    </style>
</head>
<body>

<div id="info">BOARD TILT SYNC WAVE SYSTEM</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, boardGroup, globe, waveMesh;
    let clock = new THREE.Clock();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 25); 

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
        mainLight.position.set(5, 12, 10);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const lightstick = new THREE.Group();
        scene.add(lightstick);

        // 1. 투명 구체
        globe = new THREE.Mesh(
            new THREE.SphereGeometry(2.8, 64, 64),
            new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.12, shininess: 100 })
        );
        globe.position.y = 4.5;
        lightstick.add(globe);

        // 2. 물결 레이어 (더 촘촘한 정점)
        const waveGeo = new THREE.PlaneGeometry(5.2, 1.5, 64, 32); 
        const waveMat = new THREE.MeshPhongMaterial({
            color: 0xbbbbbb,
            transparent: true,
            opacity: 0.45,
            side: THREE.DoubleSide
        });
        waveMesh = new THREE.Mesh(waveGeo, waveMat);
        waveMesh.rotation.x = -Math.PI / 2;
        waveMesh.position.set(0, 3.8, 0); 
        lightstick.add(waveMesh);

        // 3. 스케이트보드
        boardGroup = new THREE.Group();
        const deckShape = new THREE.Shape();
        deckShape.moveTo(-1.8, 0);
        deckShape.quadraticCurveTo(0, -0.1, 1.8, 0);
        deckShape.lineTo(2.0, 0.35);
        deckShape.lineTo(-2.0, 0.35);
        deckShape.closePath();

        const deck = new THREE.Mesh(
            new THREE.ExtrudeGeometry(deckShape, { depth: 1.3, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.05 }),
            new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 })
        );
        deck.position.set(0, 0, -0.65); 
        boardGroup.add(deck);

        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.15, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        [[-1.2, 0.4], [1.2, 0.4], [-1.2, -0.4], [1.2, -0.4]].forEach(p => {
            const w = new THREE.Mesh(wheelGeo, wheelMat);
            w.rotation.x = Math.PI / 2;
            w.position.set(p[0], -0.2, p[1]);
            boardGroup.add(w);
        });

        boardGroup.position.y = 4.8;
        lightstick.add(boardGroup);

        // 4. 손잡이
        const handle = new THREE.Group();
        handle.add(new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.4, 0.5, 32), new THREE.MeshStandardMaterial({color: 0xffffff})));
        const stick = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.1, 8, 32), new THREE.MeshStandardMaterial({color: 0x111111}));
        stick.position.y = -4;
        handle.add(stick);
        handle.position.y = 1.2;
        lightstick.add(handle);

        lightstick.position.y = -1;

        window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        
        // 보드 애니메이션: 상하 이동 + 역동적인 기울기(Tilt)
        const bY = 4.8 + Math.sin(t * 1.5) * 0.4;
        const bTilt = Math.sin(t * 1.2) * 0.3; // 보드의 앞뒤 기울기
        
        boardGroup.position.y = bY;
        boardGroup.rotation.z = bTilt; 
        boardGroup.rotation.y = -0.4 + Math.cos(t * 0.5) * 0.1;

        // [핵심] 보드 바닥면 기준 물결 조절 로직
        const pos = waveMesh.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i); // 물결의 가로 위치 (-2.6 ~ 2.6)
            const y = pos.getY(i);
            
            // 1. 보드의 기울기에 따른 오프셋 계산
            // 보드가 기울어진 방향(x)에 따라 보드와 물결 사이의 간격 변화를 감지
            // x가 음수일 때 기울기가 양수면(앞이 들림) 물결이 낮아지고, 반대면 높아짐
            const tiltImpact = -x * bTilt * 0.8; 
            
            // 2. 보드 높이 영향 (보드가 전체적으로 낮을 때 파동 강화)
            const heightImpact = (5.5 - bY) * 0.6;

            // 3. 파동 계산 (기울기와 높이 영향을 합침)
            const waveMain = Math.sin(x * 1.8 + t * 4.0) * (0.2 + tiltImpact + heightImpact);
            const waveSub = Math.cos(y * 2.5 + t * 2.5) * 0.1;

            // 최종 위치 설정 (너무 튀지 않게 clamp 처리)
            pos.setZ(i, Math.max(-0.8, Math.min(0.8, waveMain + waveSub)));
        }
        pos.needsUpdate = true;

        scene.rotation.y += 0.003;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
