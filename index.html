<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKFLIP 3D GLASS EDITION</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; }
        #info { position: absolute; bottom: 5%; width: 100%; text-align: center; color: #ccc; font-size: 11px; pointer-events: none; font-family: sans-serif; letter-spacing: 1px;}
    </style>
</head>
<body>

<div id="info">KICKFLIP OFFICIAL LIGHTSTICK CONCEPT</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, boardGroup, globe, handleGroup;
    let clock = new THREE.Clock();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        // 줌아웃을 조금 더 적용하여 전체 뷰 최적화
        camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 22); 

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // 조명: 유리 구체의 하이라이트를 위해 강한 직사광 추가
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
        mainLight.position.set(5, 12, 10);
        scene.add(mainLight);
        
        const sideLight = new THREE.PointLight(0xffffff, 0.5);
        sideLight.position.set(-10, 5, 5);
        scene.add(sideLight);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        const lightstick = new THREE.Group();
        scene.add(lightstick);

        // --- 커스텀 유리 & 물결 쉐이더 ---
        const waveUniforms = {
            time: { value: 0 },
            colorTop: { value: new THREE.Color(0xffffff) },
            colorBottom: { value: new THREE.Color(0x555555) }, // 회색 톤을 살짝 밝게 조정
            opacityTop: { value: 0.08 },   // 상단: 거의 투명한 유리 느낌
            opacityBottom: { value: 0.18 } // 하단: 더 투명해진 회색빛 하프톤
        };

        const vertexShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            void main() {
                vUv = uv;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                vNormal = normalize(normalMatrix * normal);
                vViewPosition = -mvPosition.xyz;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            uniform float time;
            uniform vec3 colorTop;
            uniform vec3 colorBottom;
            uniform float opacityTop;
            uniform float opacityBottom;
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vViewPosition;

            void main() {
                // 물결 로직
                float wave = sin(vUv.x * 15.0 + time * 2.5) * 0.03 + sin(vUv.x * 8.0 - time * 1.5) * 0.02;
                float edge = 0.45 + wave; 

                float mixFactor = smoothstep(edge - 0.02, edge + 0.02, vUv.y);
                
                vec3 baseColor = mix(colorBottom, colorTop, mixFactor);
                float baseOpacity = mix(opacityBottom, opacityTop, mixFactor);

                // 유리 질감 (Fresnel 효과 유사 구현: 가장자리 하이라이트)
                vec3 normal = normalize(vNormal);
                vec3 viewDir = normalize(vViewPosition);
                float fresnel = pow(1.0 - dot(normal, viewDir), 3.0);
                
                vec3 finalColor = baseColor + (fresnel * 0.4); // 가장자리에 흰색 반사 추가
                float finalOpacity = baseOpacity + (fresnel * 0.2);

                gl_FragColor = vec4(finalColor, finalOpacity);
            }
        `;

        const globeGeo = new THREE.SphereGeometry(2.8, 128, 128);
        const globeMat = new THREE.ShaderMaterial({
            uniforms: waveUniforms,
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true,
            depthWrite: false,
            side: THREE.DoubleSide
        });

        globe = new THREE.Mesh(globeGeo, globeMat);
        globe.position.y = 4.5;
        lightstick.add(globe);

        // --- 스케이트보드 (데크 너비 확장 및 얇은 두께) ---
        boardGroup = new THREE.Group();
        
        const deckShape = new THREE.Shape();
        deckShape.moveTo(-1.8, 0);
        deckShape.quadraticCurveTo(0, -0.1, 1.8, 0);
        deckShape.lineTo(2.0, 0.4);
        deckShape.lineTo(1.8, 0.5);
        deckShape.lineTo(-1.8, 0.5);
        deckShape.lineTo(-2.0, 0.4);
        deckShape.closePath();

        const extrudeSettings = { depth: 1.3, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.05 };
        const deckGeo = new THREE.ExtrudeGeometry(deckShape, extrudeSettings);
        const deckMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
        const deck = new THREE.Mesh(deckGeo, deckMat);
        deck.position.set(0, 0, -0.65); 
        boardGroup.add(deck);

        // 바퀴 (데크 아래 정렬)
        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.15, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const truckGeo = new THREE.BoxGeometry(0.1, 0.35, 0.85);
        const truckMat = new THREE.MeshStandardMaterial({ color: 0x444444 });

        [[-1.2, 0], [1.2, 0]].forEach(pos => {
            const truck = new THREE.Mesh(truckGeo, truckMat);
            truck.position.set(pos[0], -0.05, 0);
            boardGroup.add(truck);
            for(let z of [0.4, -0.4]) {
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.rotation.x = Math.PI / 2;
                w.position.set(pos[0], -0.22, z);
                boardGroup.add(w);
            }
        });

        boardGroup.position.y = 4.8; 
        boardGroup.rotation.z = Math.PI / 10; 
        boardGroup.rotation.y = -Math.PI / 6;
        lightstick.add(boardGroup);

        // --- 손잡이 섹션 ---
        handleGroup = new THREE.Group();
        const connGeo = new THREE.CylinderGeometry(1.6, 1.45, 0.5, 32);
        const connMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const connector = new THREE.Mesh(connGeo, connMat);
        connector.position.y = 1.3;
        handleGroup.add(connector);

        const stickGeo = new THREE.CylinderGeometry(1.3, 1.15, 7.5, 32);
        const stickMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.6 });
        const stick = new THREE.Mesh(stickGeo, stickMat);
        stick.position.y = -2.7;
        handleGroup.add(stick);

        const btnGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.1, 32);
        const btnMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const button = new THREE.Mesh(btnGeo, btnMat);
        button.rotation.x = Math.PI / 2;
        button.position.set(0, -1, 1.4);
        handleGroup.add(button);

        lightstick.add(handleGroup);
        lightstick.position.y = -1.5; 

        window.addEventListener('resize', onWindowResize, false);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        let elapsedTime = clock.getElapsedTime();
        globe.material.uniforms.time.value = elapsedTime;

        boardGroup.position.y = 4.8 + Math.sin(elapsedTime * 1.5) * 0.3;
        boardGroup.rotation.x = Math.sin(elapsedTime * 0.8) * 0.1;
        
        scene.rotation.y += 0.003;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
